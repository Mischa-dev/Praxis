<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0f"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer hexagon -->
  <polygon points="256,66 432,168 432,344 256,446 80,344 80,168" fill="none" stroke="#0088ff" stroke-width="2.5" opacity="0.25"/>
  <!-- Inner hexagon -->
  <polygon points="256,116 392,188 392,324 256,396 120,324 120,188" fill="none" stroke="#0088ff" stroke-width="2" opacity="0.15"/>
  <!-- Gear/cog teeth (workflow/orchestration symbol) -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- P letterform made of geometric shapes -->
    <!-- Vertical bar -->
    <rect x="178" y="150" width="28" height="212" rx="4" fill="url(#accent)"/>
    <!-- Curved top of P - using arc -->
    <path d="M 192 150 L 280 150 Q 340 150 340 210 Q 340 270 280 270 L 206 270" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Workflow nodes -->
  <circle cx="348" cy="310" r="10" fill="#0088ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="388" cy="350" r="7" fill="#00d4ff" opacity="0.5"/>
  <circle cx="368" cy="380" r="5" fill="#0088ff" opacity="0.4"/>
  <!-- Connection lines (workflow/pipeline) -->
  <line x1="348" y1="320" x2="388" y2="343" stroke="#0088ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="385" y1="355" x2="371" y2="376" stroke="#0088ff" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner accents -->
  <line x1="60" y1="100" x2="100" y2="100" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="100" x2="60" y2="140" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="452" y1="100" x2="412" y2="100" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="452" y1="100" x2="452" y2="140" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="412" x2="100" y2="412" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="412" x2="60" y2="372" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="452" y1="412" x2="412" y2="412" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <line x1="452" y1="412" x2="452" y2="372" stroke="#0088ff" stroke-width="2" opacity="0.4"/>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" fill="#0088ff" font-family="sans-serif" font-size="24" font-weight="600" opacity="0.7" letter-spacing="6">PRAXIS</text>
</svg>
