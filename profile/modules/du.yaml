id: du
name: "du"
description: "Estimate file and directory space usage"
category: filesystem
command: du
tags: [disk, storage, filesystem, usage]

arguments:
  - id: human
    name: "Human Readable"
    flag: "-h"
    type: flag
    default_enabled: true
    help: "Print sizes in human-readable format"
  - id: summary
    name: "Summary Only"
    flag: "-s"
    type: flag
    help: "Show only total for each argument, not subdirectories"
  - id: max_depth
    name: "Max Depth"
    flag: "--max-depth"
    type: text
    help: "Show totals for directories only N levels deep"
  - id: sort
    name: "Sort by Size"
    flag: "--sort=size"
    type: flag
    help: "Sort output by size (largest first)"
  - id: path
    name: "Path"
    type: positional
    position: last
    default: "."
    help: "Directory or file to analyze"

output:
  parser: regex
  patterns:
    - name: entry
      pattern: "^([\\d.]+[KMGT]?)\\s+(.+)$"
      fields: [size, path]
