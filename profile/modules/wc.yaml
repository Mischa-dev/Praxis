id: wc
name: "wc"
description: "Count lines, words, and characters in files"
category: text
binary: wc
tags: [text, count, lines, words]

arguments:
  - id: file
    name: "File"
    type: positional
    position: last
    required: true
    help: "File to count"
  - id: lines
    name: "Lines Only"
    flag: "-l"
    type: flag
    help: "Print only the line count"
  - id: words
    name: "Words Only"
    flag: "-w"
    type: flag
    help: "Print only the word count"
  - id: chars
    name: "Characters"
    flag: "-m"
    type: flag
    help: "Print only the character count"
  - id: bytes
    name: "Bytes"
    flag: "-c"
    type: flag
    help: "Print only the byte count"

output:
  type: regex
  patterns:
    - name: counts
      pattern: "^\\s*(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(.+)$"
      fields: [lines, words, bytes, filename]
