id: praxis-default
name: "Praxis"
tagline: "Action through practice."
description: "Universal CLI workflow orchestration platform"
version: "0.1.0"

# Branding
branding:
  logo_ascii: |2
        ____                  _
       / __ \_________ __  __(_)____
      / /_/ / ___/ __ `/ |/_/ / ___/
     / ____/ /  / /_/ />  </ (__  )
    /_/   /_/   \__,_/_/|_/_/____/
  tagline_secondary: "Build your workflow."

# Themes
themes:
  - id: terminal-green
    label: "Terminal Green"
    accent_primary: "#00ff41"
    accent_secondary: "#ffb000"
    accent_dim: "#0a2612"
    accent_subtle: "#0b1a10"
    accent_text: "#3dff6f"
    button_primary_text: "#0a0a0a"
    description: "Classic terminal aesthetic"
    default: true
  - id: midnight-blue
    label: "Midnight Blue"
    accent_primary: "#0088ff"
    accent_secondary: "#00d4ff"
    accent_dim: "#0a1a2e"
    accent_subtle: "#0b1520"
    accent_text: "#4da6ff"
    button_primary_text: "#0a0a0a"
    description: "Professional dark theme"
  - id: stealth
    label: "Stealth"
    accent_primary: "#737373"
    accent_secondary: "#a3a3a3"
    accent_dim: "#1a1a1a"
    accent_subtle: "#151515"
    accent_text: "#999999"
    button_primary_text: "#0a0a0a"
    description: "Minimal, muted, low-contrast"

# Target types (used for auto-detect in add dialog)
target_types:
  - id: local
    label: "Local"
    icon: "monitor"
    pattern: "^(localhost|127\\.0\\.0\\.1|::1)$"
  - id: remote
    label: "Remote"
    icon: "server"
    pattern: "^\\d{1,3}(\\.\\d{1,3}){3}$"
  - id: container
    label: "Container"
    icon: "box"
  - id: vm
    label: "VM"
    icon: "cpu"
  - id: cloud
    label: "Cloud"
    icon: "cloud"

# Tool categories
categories:
  - id: network
    label: "Network"
    icon: "network"
    description: "Network diagnostics and connectivity"
  - id: system
    label: "System"
    icon: "cpu"
    description: "System information and monitoring"
  - id: filesystem
    label: "Filesystem"
    icon: "folder"
    description: "File system exploration and analysis"
  - id: text
    label: "Text Processing"
    icon: "file-text"
    description: "Text search, filtering, and transformation"
  - id: transfer
    label: "Transfer"
    icon: "download"
    description: "File transfer and HTTP requests"

# Layout configuration
layout:
  sidebar:
    position: left
    default_width: 224
    collapsible: true
  context_panel:
    position: right
    default_width: 288
    collapsible: true
  terminal:
    position: bottom
    collapsible: true
  status_bar:
    enabled: true

# Scope checking
scope:
  enabled: false
  cloud_providers_dir: "scope/"
  enforcement_default: "off"

# Paths within the profile
paths:
  modules: "modules/"
  workflows: "workflows/"
  glossary: "glossary/"
  actions: "actions/"
  scope: "scope/"
  schema: "schema.yaml"

# Effects
effects:
  scanlines: false
  glow: true
  glitch_logo: false
  hover_lift: true
