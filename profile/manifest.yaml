id: praxis-default
name: "Praxis"
tagline: "Action through practice."
description: "Default Praxis profile — replace this with your own"
version: "0.1.0"

# Branding
branding:
  logo_ascii: |2
        ____                  _
       / __ \_________ __  __(_)____
      / /_/ / ___/ __ `/ |/_/ / ___/
     / ____/ /  / /_/ />  </ (__  )
    /_/   /_/   \__,_/_/|_/_/____/
  tagline_secondary: "Build your workflow."

# Themes
themes:
  - id: terminal-green
    label: "Terminal Green"
    accent_primary: "#00ff41"
    accent_secondary: "#ffb000"
    accent_dim: "#0a2612"
    accent_subtle: "#0b1a10"
    accent_text: "#3dff6f"
    button_primary_text: "#0a0a0a"
    description: "Classic terminal aesthetic"
    default: true
  - id: midnight-blue
    label: "Midnight Blue"
    accent_primary: "#0088ff"
    accent_secondary: "#00d4ff"
    accent_dim: "#0a1a2e"
    accent_subtle: "#0b1520"
    accent_text: "#4da6ff"
    button_primary_text: "#0a0a0a"
    description: "Professional dark theme"
  - id: stealth
    label: "Stealth"
    accent_primary: "#737373"
    accent_secondary: "#a3a3a3"
    accent_dim: "#1a1a1a"
    accent_subtle: "#151515"
    accent_text: "#999999"
    button_primary_text: "#0a0a0a"
    description: "Minimal, muted, low-contrast"

# Target types
target_types:
  - id: ip
    label: "IP Address"
    pattern: "^\\d{1,3}(\\.\\d{1,3}){3}$"
  - id: hostname
    label: "Hostname"
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9\\-]*$"
  - id: domain
    label: "Domain"
    pattern: "^([a-zA-Z0-9\\-]+\\.)+[a-zA-Z]{2,}$"
  - id: url
    label: "URL"
    pattern: "^https?://"

# Tool categories (empty — add your own)
categories: []

# Layout configuration
layout:
  sidebar:
    position: left
    default_width: 224
    collapsible: true
  context_panel:
    position: right
    default_width: 288
    collapsible: true
  terminal:
    position: bottom
    collapsible: true
  status_bar:
    enabled: true

# Effects
effects:
  scanlines: false
  glow: true
  glitch_logo: false
  hover_lift: true
